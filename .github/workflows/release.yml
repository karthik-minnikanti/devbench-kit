name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --title "DevBench ${TAG#v}" --generate-notes
          fi

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build both mac arches in one job so latest-mac.yml lists all artifacts
          - os: macos-latest
            args: --mac dmg zip --x64 --arm64
            metadata: release/latest-mac.yml
          - os: windows-latest
            args: --win nsis --x64
            metadata: release/latest.yml
          - os: ubuntu-latest
            args: --linux AppImage --x64 --arm64
            metadata: release/latest-linux.yml

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync package.json version with tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set "version=${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC toolchain (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Rebuild native modules for Electron
        shell: bash
        run: npm run rebuild:native
        env:
          CXXFLAGS: ${{ runner.os != 'Windows' && '-std=c++20' || '' }}
          GYP_MSVS_VERSION: '2022'

      - name: Build and publish
        run: npm run build && npx electron-builder ${{ matrix.args }} --publish always
        env:
          NODE_ENV: production
          VITE_API_URL: https://dev-api.devbench.in
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Allow uploads when re-running a workflow for an existing release tag
          EP_GH_IGNORE_TIME: true

      - name: Upload update metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          META="${{ matrix.metadata }}"
          TAG="${GITHUB_REF_NAME}"

          if [[ ! -f "$META" ]]; then
            echo "Update metadata was not generated: $META"
            ls -la release/ || true
            exit 1
          fi

          echo "Uploading $META to release $TAG"
          gh release upload "$TAG" "$META" --clobber

      - name: Verify update metadata is downloadable
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          FILE="$(basename "${{ matrix.metadata }}")"
          URL="https://github.com/karthik-minnikanti/devbench-kit/releases/download/${TAG}/${FILE}"

          for attempt in {1..12}; do
            if curl -fsSL "$URL" | head -20; then
              echo "Verified ${FILE} is available"
              exit 0
            fi
            echo "Waiting for ${FILE} (attempt ${attempt}/12)..."
            sleep 10
          done

          echo "Update metadata never became available: ${URL}"
          exit 1
